
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ben & Nicole — Seating Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --matcha:      #4A7C59;
    --matcha-dark: #2F5240;
    --matcha-mid:  #6A9E78;
    --sage:        #A8C5A0;
    --sage-light:  #D4E8CE;
    --cream:       #F7F2E9;
    --cream-dark:  #EDE5D5;
    --text:        #2C2C2C;
    --text-light:  #6B6B6B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(168,197,160,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(74,124,89,0.12) 0%, transparent 50%);
  }

  .floral-corner {
    position: fixed;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .floral-tl { top: 0; left: 0; width: 280px; }
  .floral-br { bottom: 0; right: 0; width: 280px; transform: rotate(180deg); }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 56px 24px 40px;
    background: linear-gradient(180deg, rgba(74,124,89,0.08) 0%, transparent 100%);
    border-bottom: 1px solid rgba(168,197,160,0.4);
  }

  .monogram {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .monogram-divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--matcha-mid), transparent);
  }
  .monogram-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--matcha-mid);
    letter-spacing: 4px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(34px, 6vw, 58px);
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--matcha-dark);
    line-height: 1.1;
    margin-bottom: 8px;
    font-style: normal;
  }

  .subtitle {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--matcha-mid);
    margin-bottom: 32px;
  }

  .search-section { max-width: 560px; margin: 0 auto; }
  .search-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--matcha);
    display: block;
    margin-bottom: 10px;
  }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 18px; top: 50%;
    transform: translateY(-50%);
    color: var(--sage); font-size: 16px; pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 16px 20px 16px 46px;
    border: 1.5px solid var(--sage);
    border-radius: 50px;
    background: rgba(255,255,255,0.85);
    font-family: 'Jost', sans-serif;
    font-size: 15px; font-weight: 300;
    color: var(--text); outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  #search::placeholder { color: #b0b8a8; }
  #search:focus { border-color: var(--matcha); box-shadow: 0 0 0 4px rgba(74,124,89,0.1); }

  #result {
    margin: 16px auto 0;
    border-radius: 16px; overflow: hidden;
    transform: translateY(6px); opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  #result.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .result-found { background: white; border: 1.5px solid var(--sage); box-shadow: 0 8px 32px rgba(74,124,89,0.12); }
  .result-none { background: #fff8f8; border: 1.5px solid #e8c0c0; padding: 20px 24px; text-align: center; font-size: 14px; color: #a06060; }
  .result-header {
    background: linear-gradient(135deg, var(--matcha) 0%, var(--matcha-mid) 100%);
    padding: 18px 24px; display: flex; align-items: center; gap: 14px;
  }
  .result-leaf { font-size: 24px; line-height: 1; }
  .result-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: white; letter-spacing: 1px; }
  .result-body { padding: 20px 24px; display: flex; align-items: center; gap: 18px; }
  .table-badge {
    flex-shrink: 0; width: 76px; height: 76px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sage-light), var(--cream-dark));
    border: 2px solid var(--sage);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .table-badge-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--matcha); font-weight: 500; margin-bottom: 1px; }
  .table-badge-num { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; color: var(--matcha-dark); line-height: 1; }
  .table-badge-text { font-size: 9px; color: var(--matcha); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; text-align: center; padding: 0 4px; line-height: 1.4; }
  .result-details p { font-size: 13.5px; color: var(--text-light); line-height: 1.7; font-weight: 300; }
  .result-details strong { color: var(--matcha-dark); font-weight: 500; }

  main {
    position: relative; z-index: 1;
    max-width: 1180px; margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .section-title { text-align: center; margin-bottom: 32px; }
  .section-title h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 300;
    color: var(--matcha-dark); letter-spacing: 2px; margin-bottom: 6px;
  }
  .ornament { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px; }
  .ornament-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--matcha-mid)); }
  .ornament-line.right { background: linear-gradient(90deg, var(--matcha-mid), transparent); }

  .special-tables {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .table-card {
    background: white;
    border: 1px solid rgba(168,197,160,0.5);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(74,124,89,0.07);
    transition: box-shadow 0.25s, transform 0.25s;
  }
  .table-card:hover { box-shadow: 0 8px 28px rgba(74,124,89,0.14); transform: translateY(-2px); }
  .table-card-header {
    background: linear-gradient(135deg, var(--matcha) 0%, var(--matcha-mid) 100%);
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .table-card.head-table .table-card-header { background: linear-gradient(135deg, var(--matcha-dark) 0%, var(--matcha) 100%); }
  .table-card.vendor-table .table-card-header { background: linear-gradient(135deg, #7a8a7a 0%, #a0b0a0 100%); }
  .table-card-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: white; letter-spacing: 1.5px; }
  .table-card-badge { font-size: 10px; color: rgba(255,255,255,0.9); letter-spacing: 1.5px; text-transform: uppercase; background: rgba(255,255,255,0.18); padding: 3px 8px; border-radius: 20px; }
  .table-card-count { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 1px; font-weight: 300; }
  .table-card-guests { padding: 10px 0; }
  .guest-row {
    display: flex; align-items: center;
    padding: 7px 18px; gap: 12px;
    border-bottom: 1px solid rgba(168,197,160,0.2);
    transition: background 0.15s;
  }
  .guest-row:last-child { border-bottom: none; }
  .guest-row:hover { background: var(--cream); }
  .guest-row.highlight { background: var(--sage-light); animation: pulse 0.6s ease; }
  @keyframes pulse { 0% { background: var(--sage); } 100% { background: var(--sage-light); } }
  .seat-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--cream-dark); font-size: 10px; font-weight: 500;
    color: var(--matcha); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .guest-name { font-size: 13.5px; font-weight: 300; color: var(--text); letter-spacing: 0.3px; }

  footer {
    position: relative; z-index: 1; text-align: center;
    padding: 24px; border-top: 1px solid rgba(168,197,160,0.3);
    font-size: 12px; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; font-weight: 300;
  }
  footer span { color: var(--matcha-mid); }

  @media (max-width: 600px) {
    .floral-tl, .floral-br { width: 180px; }
    header { padding: 40px 20px 32px; }
    main { padding: 32px 16px 60px; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="monogram">
    <div class="monogram-divider"></div>
    <div class="monogram-letter">B &amp; N</div>
    <div class="monogram-divider"></div>
  </div>
  <h1>Ben &amp; Nicole</h1>
  <p class="subtitle">Wedding Reception · Seating Chart</p>

  <div class="search-section">
    <label class="search-label" for="search">Find your seat</label>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Type your name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>
    <div id="result"></div>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main>
  <div class="section-title">
    <h2>Special Tables</h2>
    <div class="ornament">
      <div class="ornament-line"></div><span>🌿</span><div class="ornament-line right"></div>
    </div>
  </div>
  <div class="special-tables" id="specialGrid"></div>

  <div class="section-title" style="margin-top:48px;">
    <h2>All Tables</h2>
    <div class="ornament">
      <div class="ornament-line"></div><span>🌿</span><div class="ornament-line right"></div>
    </div>
  </div>
  <div class="tables-grid" id="tablesGrid"></div>
</main>

<footer>
  <span>♡</span> &nbsp;With love, Ben &amp; Nicole &nbsp;<span>♡</span>
</footer>

<script>
const tables = [
  { id:"head",   label:"Head Table",   type:"head",
    guests:["Benjamin Kantanka","Nicole Kantanka"] },
  { id:"vendor", label:"Vendor Table", type:"vendor",
    guests:["Fatima Fashami","Jalal","Rashawn Griffith"] },
  { id:2,  label:"Table 2",  type:"regular",
    guests:["Jimmy Ntagabo","Ginger Ntagabo","Agnes Mukanyandwi","Leonard Ntakengerwa","Rita Joao","Allan Mcdonald","Daniel Brown","Marlene Brown","Lulu Brown","Layden Brown"] },
  { id:3,  label:"Table 3",  type:"regular",
    guests:["Aline Natete","Annick Singizwa","Suzanne Humphrey","Herold Humphrey","Jean Nkubito","Pelagie Nkubito","Jean Pierre Mvunabandi","Brigitte Maniraguha","Ange Mutuyimana","Yannick Nshizirungu"] },
  { id:4,  label:"Table 4",  type:"regular",
    guests:["Cynthia Kantanka","Bella Obuobi","Dan Yanful","Priscilla Yanful","Ethan Yanful","Leanna Yanful","George Kantanka","Comfort Kantanka","Shaelyn Kantanka","Sarah Acquah"] },
  { id:5,  label:"Table 5",  type:"regular",
    guests:["Elikem Agbeli Watortsi","Emefah Agbeli Watortsi","Emmanuel Appiah Kubi","Michael Appiah Kubi","Roberta Acquah","Ebenezer Acquah","Ernest Yanful","Mary Yanful"] },
  { id:6,  label:"Table 6",  type:"regular",
    guests:["Sandrine Nkubito","Rafael Kanuma","Kelvin Nkubito","Ildephonse Habarugira","Providence Habarugira","Nicole Perrault","Jean Perrault","Jeannette Mukarukundo","Vital Manirakiza","Hirwa Nicolas"] },
  { id:7,  label:"Table 7",  type:"regular",
    guests:["Geetika Gupta","Nazia Shah","Andrey Breniov","Narinder Waraich","Sandeep Shrowthi","Hope Ibyimanishaka","Sarah Boafo","Timothy Boafo"] },
  { id:8,  label:"Table 8",  type:"regular",
    guests:["Eline Mpalirwa","Pascal Mpalirwa","Norah Nyirakamana","Emmanuel Musabyimana","Antoine Ntawuguranimana","Emilienne Rushyizekera","Christophe Mukeza","Verene Mukeza"] },
  { id:9,  label:"Table 9",  type:"regular",
    guests:["Laetitia Habarugira","Jean Chrysostome Mukezangango","Joseph Usabimana","Gertrude Mukfuraha","Emmanuel Frimpong Manso","Sandra Frimpong Manso","Stella Annan","Leslie Annan"] },
  { id:10, label:"Table 10", type:"regular",
    guests:["Chelsea Sikubwabo","Jude Paho","Lena Niyikiza","Nicky Ineza","Dodos Twiringiyimana","Alain Mutangana","Rebecca Iyibambe","Esther Irakiza","Peter Bokango","Michael Sarfo"] },
  { id:11, label:"Table 11", type:"regular",
    guests:["Fatima Hassan","Mariam Hassan","Carmen Alarcon","Ilwad Gure","Hayat Mahoud","David Kantanka","Alyssa Chong","Matt Sham","Rajveer Dhillon","Aimee Karaul"] },
  { id:12, label:"Table 12", type:"regular",
    guests:["Mark Sunderland","Gail Snuggs","Rafaela Antunes","Angela Morshead","Monica Hanna","Samantha Hammill","Lisa McLaughlin","Mugdha Jauhari","Julie Tropiano","Floride Nyirasafali"] },
  { id:13, label:"Table 13", type:"regular",
    guests:["Rosine Uwizeye","Vaillante B\u00e9khora","Clementine Mutoni","Jean Batiste Ndayambaje","Patrick Tuyishime","Jacqueline Sano","Maurice Tuyisenge","Mireille Iradukunda","Theoneste Mutabazii","Anne Lyse Mutabazi"] },
  { id:14, label:"Table 14", type:"regular",
    guests:["Samuel Makoji","Dami Makoji","Edna Agyeman Buaful","Richmond Agyeman Buaful","Gabby Agyeman Buaful","Nana Agyeman Buaful","Cassandre Gbegbe","Ermanie Dorelien","Lawrence Osei Antoh","Gladys Osei Antoh"] },
  { id:15, label:"Table 15", type:"regular",
    guests:["Kofi Darko","Gyasi Darko","Annette Darko","Masego Darko","Mudassir Choudhry","Rafeah Alam","Ade Adesegun","Jane Adenodi","Adeolu Adenodi","Sanmi Oduwole"] }
];

// Flat list for search
const allGuests = [];
tables.forEach(t => {
  t.guests.forEach((name, i) => {
    if (name) allGuests.push({ name, tableId: t.id, tableLabel: t.label, tableType: t.type, seat: i + 1 });
  });
});

function makeCard(t) {
  const card = document.createElement('div');
  card.className = `table-card${t.type === 'head' ? ' head-table' : t.type === 'vendor' ? ' vendor-table' : ''}`;
  card.dataset.tableId = t.id;
  const badge = t.type === 'head'   ? '<span class="table-card-badge">Bride &amp; Groom</span>'
              : t.type === 'vendor' ? '<span class="table-card-badge">Staff</span>'
              : `<span class="table-card-count">${t.guests.filter(Boolean).length} guests</span>`;
  card.innerHTML = `
    <div class="table-card-header">
      <span class="table-card-title">${t.label}</span>${badge}
    </div>
    <div class="table-card-guests">
      ${t.guests.filter(Boolean).map((name,i) => `
        <div class="guest-row" data-name="${name.toLowerCase()}">
          <div class="seat-num">${i+1}</div>
          <div class="guest-name">${name}</div>
        </div>`).join('')}
    </div>`;
  return card;
}

const specialGrid = document.getElementById('specialGrid');
const tablesGrid  = document.getElementById('tablesGrid');
tables.forEach(t => (t.type === 'regular' ? tablesGrid : specialGrid).appendChild(makeCard(t)));

// Search
const searchInput = document.getElementById('search');
const resultDiv   = document.getElementById('result');
let highlightedRows = [];

function clearHighlights() { highlightedRows.forEach(r => r.classList.remove('highlight')); highlightedRows = []; }

searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  clearHighlights(); resultDiv.className = ''; resultDiv.innerHTML = '';
  if (!query) return;

  const match = allGuests.find(g => g.name.toLowerCase().includes(query));
  if (match) {
    const badgeInner = (match.tableType !== 'regular')
      ? `<div class="table-badge-text">${match.tableLabel}</div>`
      : `<div class="table-badge-label">Table</div><div class="table-badge-num">${match.tableId}</div>`;
    const msg = match.tableType === 'head'   ? `You're seated at the <strong>Head Table</strong> with the bride &amp; groom.`
              : match.tableType === 'vendor' ? `You're at the <strong>Vendor Table</strong>. Thank you for being part of this special day!`
              : `You're seated at <strong>${match.tableLabel}</strong>, Seat ${match.seat}.`;

    resultDiv.className = 'result-found visible';
    resultDiv.innerHTML = `
      <div class="result-header"><div class="result-leaf">🌿</div><div class="result-name">${match.name}</div></div>
      <div class="result-body">
        <div class="table-badge">${badgeInner}</div>
        <div class="result-details"><p>${msg}</p><p>Please make your way to your table and enjoy the celebration!</p></div>
      </div>`;

    document.querySelectorAll('.table-card').forEach(card => {
      if (String(card.dataset.tableId) === String(match.tableId)) {
        const row = card.querySelector(`[data-name="${match.name.toLowerCase()}"]`);
        if (row) { row.classList.add('highlight'); highlightedRows.push(row); }
      }
    });
    setTimeout(() => resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  } else {
    resultDiv.className = 'result-none visible';
    resultDiv.innerHTML = `We couldn't find "<strong>${searchInput.value.trim()}</strong>" — please try your full name or ask a member of the wedding party.`;
  }
});
</script>
</body>
</html>
